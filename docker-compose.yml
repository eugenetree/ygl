services:
  # ── 1. PostgreSQL Database ──────────────────────────────────────────────────
  db:
    container_name: db
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-saythis}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-saythis}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 2. Elasticsearch ───────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  # ── 3. Application Services (Shared Image) ──────────────────────────────────
  bot:
    container_name: bot
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile.dev}
    image: saythis-app:latest
    environment: &app-env
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-saythis}
      DB_HOST: db
      DB_PORT: 5432
      ES_NODE: http://elasticsearch:9200
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - /opt/ygl/logs:/usr/src/app/logs
    command: npm run start:bot
    depends_on:
      db:
        condition: service_healthy

  sync-elastic:
    container_name: sync-elastic
    image: saythis-app:latest
    environment: *app-env
    command: npm run start:elastic
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  # ── 4. VPN Scraper (Special Image) ─────────────────────────────────────────
  scraper:
    container_name: scraper
    build:
      context: .
      dockerfile: Dockerfile.scraper
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      <<: *app-env
      VPN_USER: ${VPN_USER}
      VPN_PASS: ${VPN_PASS}
      VPN_CONFIG_B64: ${VPN_CONFIG_B64}
      YTDLP_COOKIES_B64: ${YTDLP_COOKIES_B64:-}
    volumes:
      - /opt/ygl/logs:/usr/src/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
